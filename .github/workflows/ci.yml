name: CI

on:
  push:
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app_server/requirements-dev.txt

      - name: Lint backend
        run: |
          cd app_server
          ruff check .

      - name: Run tests
        run: |
          cd app_server
          pytest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t inventory-backend ./app_server

      - name: Validate compose stack
        run: docker compose config
